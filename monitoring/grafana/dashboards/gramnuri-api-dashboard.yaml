apiVersion: v1
kind: ConfigMap
metadata:
  name: gramnuri-api-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  gramnuri-api-dashboard.json: |-
    {
      "uid": "gramnuri-api-monitoring",
      "title": "Gramnuri API Monitoring",
      "tags": ["gramnuri", "api", "application"],
      "timezone": "browser",
      "schemaVersion": 16,
      "version": 0,
      "refresh": "30s",
      "templating": {
        "list": [
          {
            "name": "namespace",
            "label": "Environment",
            "type": "custom",
            "query": "dev,prod",
            "current": {
              "selected": true,
              "text": "prod",
              "value": "prod"
            },
            "includeAll": false,
            "multi": false,
            "options": [
              {
                "selected": false,
                "text": "dev",
                "value": "dev"
              },
              {
                "selected": true,
                "text": "prod",
                "value": "prod"
              }
            ]
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "HTTP Request Rate",
          "type": "graph",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{job=\"gramnuri-api\", namespace=\"$namespace\"}[5m])) by (code)",
              "legendFormat": "{{code}}",
              "refId": "A"
            }
          ],
          "yaxes": [
            {"format": "reqps", "label": "Requests/sec"},
            {"format": "short"}
          ]
        },
        {
          "id": 2,
          "title": "HTTP 5xx Error Rate (5m)",
          "type": "graph",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "targets": [
            {
              "expr": "gramnuri_api:http_5xx_error_rate:ratio5m{namespace=\"$namespace\"}",
              "legendFormat": "{{namespace}}",
              "refId": "A"
            }
          ],
          "yaxes": [
            {"format": "percentunit", "label": "Error rate"},
            {"format": "short"}
          ]
        },
        {
          "id": 3,
          "title": "Error Logs (Last 1h)",
          "type": "logs",
          "gridPos": {"h": 10, "w": 24, "x": 0, "y": 8},
          "targets": [
            {
              "expr": "{app=\"gramnuri-api\", namespace=\"$namespace\"} | json | level=\"error\"",
              "refId": "A"
            }
          ],
          "options": {
            "showTime": true,
            "showLabels": true,
            "sortOrder": "Descending"
          }
        },
        {
          "id": 4,
          "title": "Request Latency (p99)",
          "type": "graph",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 18},
          "targets": [
            {
              "expr": "gramnuri_api:latency:p99_5m{namespace=\"$namespace\"}",
              "legendFormat": "{{namespace}} p99",
              "refId": "A"
            }
          ],
          "yaxes": [
            {"format": "s", "label": "Latency"},
            {"format": "short"}
          ]
        },
        {
          "id": 5,
          "title": "Active Connections",
          "type": "stat",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 18},
          "targets": [
            {
              "expr": "sum(http_connections_active{job=\"gramnuri-api\", namespace=\"$namespace\"}) by (namespace)",
              "legendFormat": "{{namespace}}",
              "refId": "A"
            }
          ],
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto"
          }
        }
      ]
    }
