apiVersion: apps/v1
kind: Deployment
metadata:
  name: gramnuri-web
  labels:
    app: gramnuri-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gramnuri-web
  template:
    metadata:
      labels:
        app: gramnuri-web
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: gramnuri-web
          image: ghcr.io/igh9410/gramnuri-web
          ports:
            - name: http
              containerPort: 3000
          lifecycle:
            preStop:
              sleep:
                seconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 100Mi
          startupProbe:
            httpGet:
              path: /healthcheck
              port: http
            failureThreshold: 10
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthcheck
              port: http
            periodSeconds: 30
      imagePullSecrets:
        - name: ghcr-image-pull-secrets
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app: gramnuri-web
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: gramnuri-web
      nodeSelector:
        kubernetes.io/arch: amd64
        kubernetes.io/os: linux
